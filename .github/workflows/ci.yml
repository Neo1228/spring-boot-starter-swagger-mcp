name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17", "21", "25"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Verify project consistency
        if: ${{ matrix.java-version == '17' }}
        run: scripts/verify-project-consistency.sh

      - name: Verify marketplace metadata
        if: ${{ matrix.java-version == '17' }}
        run: scripts/verify-marketplace-metadata.sh

      - name: Verify example consumer against local Maven artifact
        if: ${{ matrix.java-version == '17' }}
        run: |
          ./gradlew publishToMavenLocal --no-daemon
          cd examples/minimal-webmvc-gradle
          ./gradlew test --no-daemon
