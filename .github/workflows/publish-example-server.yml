name: Publish Example MCP Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image/server metadata version, for example 0.1.0"
        required: true
      publishRegistry:
        description: "Publish registry/server.json to the official MCP Registry after pushing GHCR image"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  publish-example:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push example image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: examples/minimal-webmvc-gradle/Dockerfile
          push: true
          tags: |
            ghcr.io/neo1228/swagger-mcp-bridge-example:${{ steps.version.outputs.version }}
            ghcr.io/neo1228/swagger-mcp-bridge-example:latest
          labels: |
            org.opencontainers.image.title=Swagger MCP Bridge Example Server
            org.opencontainers.image.source=https://github.com/Neo1228/spring-boot-starter-swagger-mcp
            io.modelcontextprotocol.server.name=io.github.neo1228/swagger-mcp-bridge

      - name: Render server.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg version "$VERSION" \
             --arg image "ghcr.io/neo1228/swagger-mcp-bridge-example:$VERSION" \
             '.version = $version | .packages[0].identifier = $image' \
             registry/server.json > server.json

      - name: Install mcp-publisher
        if: ${{ github.event.inputs.publishRegistry == 'true' }}
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        if: ${{ github.event.inputs.publishRegistry == 'true' }}
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
